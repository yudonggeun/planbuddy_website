<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="robots" content="noindex">
<meta name="theme-color" content="#0D0F12">
<title>클라이밍 MBTI — Cliff</title>
<style>
:root{
  --bg:#0D0F12; --card:#161A1F; --stroke:rgba(255,255,255,0.08); --ph:#292929;
  --accent:#E74408; --accent-hi:#FF6730; --text:#F5F0E8; --muted:#AAAAAA; --sel:#FFD400;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  position:fixed; inset:0; width:100%; overflow:hidden;
  background:var(--bg); color:var(--text);
  font-family:ui-rounded,"SF Pro Rounded",system-ui,sans-serif;
  overscroll-behavior:none;
  -webkit-font-smoothing:antialiased;
  user-select:none; -webkit-user-select:none;
}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer;touch-action:manipulation}

/* ── screens ── */
.screen{
  position:absolute; inset:0; display:none; flex-direction:column;
  padding:calc(env(safe-area-inset-top) + 16px) 24px calc(env(safe-area-inset-bottom) + 24px);
}
.screen.active{display:flex; animation:fadeUp .35s cubic-bezier(.4,0,.2,1)}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@media (prefers-reduced-motion:reduce){
  *{animation:none!important;transition:none!important}
}

/* ── intro ── */
#screen-intro{align-items:center;text-align:center}
.intro-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;width:100%}
.intro-icon{
  width:88px;height:88px;border-radius:24px;background:var(--card);
  border:1px solid var(--stroke);display:flex;align-items:center;justify-content:center;
  margin-bottom:8px;
}
.intro-title{font-size:32px;font-weight:800;letter-spacing:-0.5px}
.intro-sub{font-size:16px;color:var(--muted);line-height:1.5}
.axis-chips{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;margin-top:8px;max-width:320px}
.chip{
  display:inline-flex;align-items:center;gap:8px;padding:8px 12px;border-radius:9999px;
  background:var(--card);border:1px solid var(--stroke);font-size:13px;color:var(--muted);
}
.chip b{color:var(--accent-hi);font-weight:800}
.last-result{font-size:13px;color:var(--muted);margin-top:8px}
.last-result b{color:var(--text)}

/* ── buttons ── */
.btn{
  display:flex;align-items:center;justify-content:center;gap:8px;
  width:100%;min-height:56px;padding:16px 24px;border-radius:9999px;
  font-size:17px;font-weight:700;
  transition:transform .15s ease,opacity .15s ease;
}
.btn:active{transform:scale(.97)}
.btn-primary{background:linear-gradient(135deg,var(--accent-hi),var(--accent));color:#fff}
.btn-secondary{background:var(--card);color:var(--text);border:1px solid var(--stroke)}
.btn svg{flex:none}

/* ── question ── */
.q-header{display:flex;align-items:center;gap:12px;min-height:44px}
.icon-btn{
  width:40px;height:40px;flex:none;border-radius:9999px;
  display:flex;align-items:center;justify-content:center;
  background:var(--card);border:1px solid var(--stroke);
  transition:transform .12s ease;
}
.icon-btn:active{transform:scale(.92)}
.progress-track{flex:1;height:8px;border-radius:9999px;background:#1a1a1a;overflow:hidden}
.progress-fill{
  height:100%;width:0;border-radius:9999px;
  background:linear-gradient(90deg,var(--accent),var(--accent-hi));
  transition:width .35s cubic-bezier(.4,0,.2,1);
}
.q-count{font-size:13px;font-weight:700;color:var(--muted);min-width:38px;text-align:right;font-variant-numeric:tabular-nums}
.q-body{flex:1;display:flex;flex-direction:column;justify-content:center;gap:24px;padding:24px 0}
.q-num{font-size:15px;font-weight:800;color:var(--accent-hi)}
.q-text{font-size:clamp(22px,6vw,26px);font-weight:800;line-height:1.35;letter-spacing:-0.3px;min-height:2.7em}
.options{display:flex;flex-direction:column;gap:12px}
.option{
  display:flex;align-items:center;gap:16px;width:100%;text-align:left;
  background:var(--card);border:1px solid var(--stroke);border-radius:24px;
  padding:24px;font-size:16px;line-height:1.45;color:var(--text);
  transition:transform .12s ease,border-color .12s ease,background .12s ease;
}
.option.pressed{transform:scale(.97)}
.option.selected{border-color:var(--accent);background:rgba(231,68,8,.12)}
.option.selected .opt-chip{border-color:var(--accent);color:#fff;background:var(--accent)}
.opt-chip{
  flex:none;width:32px;height:32px;border-radius:9999px;
  display:flex;align-items:center;justify-content:center;
  border:1px solid var(--stroke);background:var(--bg);
  font-size:14px;font-weight:800;color:var(--muted);
  transition:background .12s ease,color .12s ease,border-color .12s ease;
}

/* ── result ── */
#screen-result{overflow-y:auto;-webkit-overflow-scrolling:touch;display:none}
#screen-result.active{display:block}
#screen-result.with-cta .result-inner{padding-bottom:96px}
.result-inner{display:flex;flex-direction:column;gap:16px;max-width:480px;margin:0 auto;padding:16px 0 24px}
.result-label{font-size:14px;font-weight:700;color:var(--muted);text-align:center}
.code-badge{display:flex;gap:8px;justify-content:center}
.code-badge span{
  width:56px;height:64px;display:flex;align-items:center;justify-content:center;
  font-size:32px;font-weight:800;color:var(--accent-hi);
  background:var(--card);border:1px solid var(--stroke);border-radius:16px;
}
.r-nickname{font-size:26px;font-weight:800;text-align:center;letter-spacing:-0.3px}
.r-tagline{font-size:15px;color:var(--muted);text-align:center;margin-bottom:8px}
.card{
  background:var(--card);border:1px solid var(--stroke);border-radius:24px;
  padding:24px;display:flex;flex-direction:column;gap:12px;
}
.card h3{font-size:13px;font-weight:800;color:var(--accent-hi);letter-spacing:.4px}
.card p{font-size:15px;line-height:1.6;color:var(--text)}
.trait-list{list-style:none;display:flex;flex-direction:column;gap:12px}
.trait-list li{display:flex;gap:12px;align-items:flex-start;font-size:15px;line-height:1.5}
.trait-list svg{flex:none;margin-top:2px}
.axis-row{display:flex;flex-direction:column;gap:8px;margin-bottom:4px}
.axis-labels{display:flex;justify-content:space-between;font-size:13px;color:var(--muted);font-variant-numeric:tabular-nums}
.axis-labels .win{color:var(--text);font-weight:800}
.axis-labels .win em{font-style:normal;color:var(--accent-hi)}
.axis-track{display:flex;height:8px;border-radius:9999px;background:#1a1a1a;overflow:hidden}
.axis-fill{height:100%;border-radius:9999px;background:linear-gradient(90deg,var(--accent),var(--accent-hi));transition:width .6s cubic-bezier(.4,0,.2,1)}
.axis-fill.anchor-right{margin-left:auto;background:linear-gradient(270deg,var(--accent),var(--accent-hi))}
.partner-name{font-size:17px;font-weight:800}
.partner-name b{color:var(--accent-hi)}
.result-actions{display:flex;flex-direction:column;gap:12px;margin-top:8px}

/* ── processing-done pill (질문 헤더 아래 — 컨트롤과 겹침 방지) ── */
#done-pill{
  position:fixed;top:calc(env(safe-area-inset-top) + 64px);right:16px;z-index:50;
  display:none;align-items:center;gap:8px;padding:8px 12px;border-radius:9999px;
  background:var(--card);border:1px solid var(--stroke);
  font-size:13px;font-weight:700;color:var(--text);
  animation:fadeUp .3s ease;
}

/* ── bottom CTA (in-app, processing done, result screen) ── */
#cta-bar{
  position:fixed;left:0;right:0;bottom:0;z-index:40;display:none;
  padding:12px 24px calc(env(safe-area-inset-bottom) + 12px);
  background:linear-gradient(to top,rgba(13,15,18,.97) 60%,rgba(13,15,18,0));
}

/* ── share fallback overlay ── */
#share-overlay{
  position:fixed;inset:0;z-index:100;display:none;flex-direction:column;
  align-items:center;justify-content:center;gap:16px;
  padding:calc(env(safe-area-inset-top) + 24px) 24px calc(env(safe-area-inset-bottom) + 24px);
  background:var(--bg);
}
#share-overlay.visible{display:flex;animation:fadeUp .25s ease}
#share-overlay img{max-width:100%;max-height:65dvh;border-radius:16px;border:1px solid var(--stroke)}
#share-overlay p{font-size:14px;color:var(--muted)}
#share-overlay .btn{max-width:320px}
</style>
</head>
<body>

<!-- 처리 완료 pill (질문/인트로 화면용) -->
<div id="done-pill" aria-live="polite">
  <svg width="14" height="14" viewBox="0 0 20 20" fill="none" aria-hidden="true">
    <path d="M4 10.5l4 4 8-9" stroke="#FF6730" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
  분석 완료
</div>

<!-- INTRO -->
<section id="screen-intro" class="screen active">
  <div class="intro-wrap">
    <div class="intro-icon" aria-hidden="true">
      <svg width="56" height="56" viewBox="0 0 64 64" fill="none">
        <path d="M27 10h11c7.7 0 14 6.3 14 14v16c0 7.7-6.3 14-14 14H26c-7.7 0-14-6.3-14-14V26c0-4.9 2.5-9.2 6.3-11.7"
              stroke="#E74408" stroke-width="4" stroke-linecap="round"/>
        <path d="M21 13 29 18" stroke="#F5F0E8" stroke-width="4" stroke-linecap="round"/>
      </svg>
    </div>
    <h1 class="intro-title">클라이밍 MBTI</h1>
    <p class="intro-sub">12문항으로 알아보는<br>나의 클라이밍 유형</p>
    <div class="axis-chips" aria-hidden="true">
      <span class="chip"><b>C·S</b> 에너지</span>
      <span class="chip"><b>D·T</b> 무브</span>
      <span class="chip"><b>A·F</b> 루트 풀이</span>
      <span class="chip"><b>P·V</b> 동기</span>
    </div>
    <p id="last-result" class="last-result" hidden></p>
  </div>
  <button id="btn-start" class="btn btn-primary">시작하기</button>
</section>

<!-- QUESTION -->
<section id="screen-question" class="screen">
  <header class="q-header">
    <button id="btn-back" class="icon-btn" aria-label="이전 질문으로">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M14.5 5 8 12l6.5 7" stroke="#F5F0E8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <div class="progress-track"><div id="progress-fill" class="progress-fill"></div></div>
    <span id="q-count" class="q-count">1/12</span>
  </header>
  <div class="q-body" id="q-body">
    <span id="q-num" class="q-num">Q1</span>
    <h2 id="q-text" class="q-text"></h2>
    <div class="options">
      <button class="option" id="opt-0"><span class="opt-chip">A</span><span id="opt-0-text"></span></button>
      <button class="option" id="opt-1"><span class="opt-chip">B</span><span id="opt-1-text"></span></button>
    </div>
  </div>
</section>

<!-- RESULT -->
<section id="screen-result" class="screen">
  <div class="result-inner" id="result-inner">
    <p class="result-label">나의 클라이밍 유형</p>
    <div id="code-badge" class="code-badge"></div>
    <h2 id="r-nickname" class="r-nickname"></h2>
    <p id="r-tagline" class="r-tagline"></p>
    <div class="card"><p id="r-desc"></p></div>
    <div class="card">
      <h3>강점 & 주의</h3>
      <ul id="r-traits" class="trait-list"></ul>
    </div>
    <div class="card">
      <h3>성향 분석</h3>
      <div id="r-axes"></div>
    </div>
    <div class="card">
      <h3>찰떡 파트너</h3>
      <p id="r-partner-name" class="partner-name"></p>
      <p id="r-partner-why"></p>
    </div>
    <div class="result-actions">
      <button id="btn-share" class="btn btn-primary">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M12 3v10"/><path d="M8.5 6.5 12 3l3.5 3.5"/>
          <path d="M7 10H6a2 2 0 0 0-2 2v7a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-7a2 2 0 0 0-2-2h-1"/>
        </svg>
        이미지로 공유
      </button>
      <button id="btn-retry" class="btn btn-secondary">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#F5F0E8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M20 12a8 8 0 1 1-2.34-5.66"/><path d="M20 4v4h-4"/>
        </svg>
        다시 하기
      </button>
    </div>
  </div>
</section>

<!-- 앱 내 + 처리 완료 시 결과 화면 하단 CTA -->
<div id="cta-bar">
  <button id="btn-content-end" class="btn btn-primary">분석 결과 보기 →</button>
</div>

<!-- 공유 폴백 오버레이 -->
<div id="share-overlay">
  <img id="share-img" alt="클라이밍 MBTI 결과 카드">
  <p>이미지를 길게 눌러 저장하세요</p>
  <button id="btn-overlay-close" class="btn btn-secondary">닫기</button>
</div>

<canvas id="share-canvas" width="1080" height="1350" hidden></canvas>

<script src="cliff-bridge.js"></script>
<script>
(function () {
  'use strict';

  /* ── 브리지 (미로드 시 no-op 폴백) ── */
  var noop = function () {};
  var B = window.CliffBridge || {
    inApp: false, contentStart: noop, contentEnd: noop,
    isProcessingDone: function () { return false; },
    onProcessingDone: noop,
    shareImage: function () { return false; }
  };

  var STORAGE_KEY = 'cliffMbtiResult';
  var ADVANCE_DELAY_MS = 150;
  var FONT = 'ui-rounded,"SF Pro Rounded",system-ui,sans-serif';

  /* ── 4축 정의 (코드 자릿수 순서 고정: C/S, D/T, A/F, P/V) ── */
  var AXES = [
    { letters: ['C', 'S'], names: ['크루형', '솔로형'] },
    { letters: ['D', 'T'], names: ['다이노형', '정밀형'] },
    { letters: ['A', 'F'], names: ['설계형', '직감형'] },
    { letters: ['P', 'V'], names: ['정복형', '유희형'] }
  ];

  /* ── 12문항 (축 인터리브: 0,1,2,3 × 3바퀴) — A 선택지=축 첫 글자 ── */
  var QUESTIONS = [
    { a: 0, q: '암장에 도착했어요. 가장 먼저 하는 일은?',
      o: ['오늘 온 크루부터 찾고 인사 한 바퀴 돌아요', '바로 벽 앞으로 가서 오늘 탈 문제를 스캔해요'] },
    { a: 1, q: '마지막 홀드가 아슬아슬하게 멀어 보여요. 나는?',
      o: ['고민은 짧게! 일단 몸을 던져 봐요', '발 위치부터 다시 잡고 정확하게 닿는 방법을 찾아요'] },
    { a: 2, q: '처음 보는 문제 앞에 섰어요. 출발 전 나는?',
      o: ['바닥에서 손 순서까지 머릿속으로 다 그려본 뒤 출발해요', '일단 붙어 봐요. 벽 위에서 몸이 답을 찾아줘요'] },
    { a: 3, q: '오늘따라 컨디션이 최고예요! 뭘 할까요?',
      o: ['묵혀둔 한계 등급 프로젝트에 도전해요', '기분 좋은 난이도로 신나게 양치기해요'] },
    { a: 0, q: '어려운 문제에 제대로 막혔어요. 나는?',
      o: ['옆 사람들에게 "이거 어떻게 푸셨어요?" 하고 물어봐요', '혼자 영상을 찍어 돌려보며 조용히 분석해요'] },
    { a: 1, q: '내 클라이밍 영상을 돌려봤어요. 눈에 들어오는 장면은?',
      o: ['시원하게 날아간 다이노! 폼 미쳤다', '흔들림 없는 정적 무브와 발끝 컨트롤이요'] },
    { a: 2, q: '크럭스에서 세 번 연속 떨어졌어요. 다음 시도 전에 나는?',
      o: ['내려와서 무브를 분해하고 시퀀스를 다시 설계해요', '바로 다시 붙어요. 몸이 기억할 때까지 부딪혀 봐요'] },
    { a: 3, q: '클라이밍에서 가장 짜릿한 순간은?',
      o: ['몇 주 동안 매달린 프로젝트를 드디어 완등했을 때', '흐름을 타며 문제가 술술 풀리는 그 기분 자체'] },
    { a: 0, q: '시도 사이 레스트 타임, 나는?',
      o: ['매트에 둘러앉아 다 같이 베타 토크하며 떠들어요', '이어폰 끼고 다음 시도를 머릿속으로 돌려봐요'] },
    { a: 1, q: '런앤점프 코디 문제가 새로 세팅됐어요!',
      o: ['오늘의 메인 디시! 제일 먼저 줄 서요', '음… 저는 옆의 밸런스 슬랩이 더 끌려요'] },
    { a: 2, q: '다른 사람의 등반을 구경할 때 나는?',
      o: ['손 순서·발 순서를 외워서 내 베타에 반영해요', '느낌만 봐요. 내 몸에 맞는지는 붙어봐야 알아요'] },
    { a: 3, q: '다음 시즌 목표를 정한다면?',
      o: ['한 등급 위 뚫기. 숫자로 증명하고 싶어요', '더 자주, 더 즐겁게! 꾸준히 타는 게 목표예요'] }
  ];

  /* ── 16유형 ── */
  var TYPES = {
    CDAP: { nickname: '암장의 인간 대포', tagline: '치밀하게 계산된 비행으로 한계를 부숴요.',
      desc: '크루의 환호 속에서 가장 빛나는 타입이에요. 다이내믹한 무브를 좋아하지만 무작정 던지진 않아요. 바닥에서 시퀀스를 다 그린 뒤, 가장 화려한 방법으로 한계 등급을 정조준해요.',
      strengths: ['크루 전체의 텐션을 끌어올리는 추진력', '큰 무브도 설계대로 꽂아 넣는 정확한 대담함'],
      caution: '어깨와 손가락이 비명 지르기 전에 레스트도 계획에 넣어요',
      partner: { code: 'STFV', why: '들뜬 텐션을 차분한 플로우로 식혀주는 정반대 케미예요.' } },

  /* ── 상태 ── */
  var state = { screen: 'intro', index: 0, answers: [], result: null, locked: false };

  function $(id) { return document.getElementById(id); }

  /* ── 화면 전환 ── */
  function showScreen(name) {
    state.screen = name;
    ['intro', 'question', 'result'].forEach(function (s) {
      $('screen-' + s).classList.toggle('active', s === name);
    });
    if (name === 'result') $('screen-result').scrollTop = 0;
    updateProcessingUI();
  }

  /* ── 처리 완료 UI (LIVE 반영: pill / 하단 CTA) ── */
  function updateProcessingUI() {
    var done = B.inApp && B.isProcessingDone();
    var onResult = state.screen === 'result';
    $('done-pill').style.display = (done && !onResult) ? 'flex' : 'none';
    $('cta-bar').style.display = (done && onResult) ? 'block' : 'none';
    $('screen-result').classList.toggle('with-cta', done && onResult);
  }

  /* ── 결과 계산 (3문항/축 → 동률 없음) ── */
  function computeResult(answers) {
    var counts = AXES.map(function () { return [0, 0]; });
    answers.forEach(function (letter, i) {
      var a = QUESTIONS[i].a;
      var idx = AXES[a].letters.indexOf(letter);
      if (idx >= 0) counts[a][idx]++;
    });
    var code = counts.map(function (c, a) {
      return AXES[a].letters[c[0] >= c[1] ? 0 : 1];
    }).join('');
    return { code: code, counts: counts };
  }

  /* ── localStorage (선택적 — 실패 무시) ── */
  function saveLast(code) { try { localStorage.setItem(STORAGE_KEY, code); } catch (e) {} }
  function loadLast() {
    var code = null;
    try { code = localStorage.getItem(STORAGE_KEY); } catch (e) {}
    var el = $('last-result');
    if (code && TYPES[code]) {
      el.hidden = false;
      el.innerHTML = '';
      el.appendChild(document.createTextNode('지난 결과: '));
      var b = document.createElement('b');
      b.textContent = code + ' · ' + TYPES[code].nickname;
      el.appendChild(b);
    } else {
      el.hidden = true;
    }
  }

  /* ── 질문 렌더 ── */
  function renderQuestion() {
    var i = state.index;
    var item = QUESTIONS[i];
    $('progress-fill').style.width = ((i + 1) / QUESTIONS.length * 100) + '%';
    $('q-count').textContent = (i + 1) + '/' + QUESTIONS.length;
    $('q-num').textContent = 'Q' + (i + 1);
    $('q-text').textContent = item.q;
    $('opt-0-text').textContent = item.o[0];
    $('opt-1-text').textContent = item.o[1];
    [0, 1].forEach(function (n) {
      $('opt-' + n).classList.remove('selected', 'pressed');
    });
    state.locked = false;
    /* 본문 페이드 재생 */
    var body = $('q-body');
    body.style.animation = 'none';
    void body.offsetWidth;
    body.style.animation = 'fadeUp .3s cubic-bezier(.4,0,.2,1)';
  }

  function selectOption(n) {
    if (state.locked || state.screen !== 'question') return;
    state.locked = true;
    $('opt-' + n).classList.add('selected');
    var letter = AXES[QUESTIONS[state.index].a].letters[n];
    setTimeout(function () {
      state.answers.push(letter);
      if (state.index >= QUESTIONS.length - 1) {
        finishSurvey();
      } else {
        state.index++;
        renderQuestion();
      }
    }, ADVANCE_DELAY_MS);
  }

  function goBack() {
    if (state.locked) return;
    if (state.index === 0) {
      state.answers = [];
      loadLast();
      showScreen('intro');
      return;
    }
    state.index--;
    state.answers.pop();
    renderQuestion();
  }

  /* ── 결과 렌더 ── */
  function finishSurvey() {
    state.result = computeResult(state.answers);
    saveLast(state.result.code);
    renderResult(state.result);
    showScreen('result');
  }

  var SVG_NS = 'http://www.w3.org/2000/svg';
  function makeIcon(kind) {
    var svg = document.createElementNS(SVG_NS, 'svg');
    svg.setAttribute('width', '16'); svg.setAttribute('height', '16');
    svg.setAttribute('viewBox', '0 0 20 20'); svg.setAttribute('fill', 'none');
    svg.setAttribute('aria-hidden', 'true');
    function path(d, color, w) {
      var p = document.createElementNS(SVG_NS, 'path');
      p.setAttribute('d', d); p.setAttribute('stroke', color);
      p.setAttribute('stroke-width', w); p.setAttribute('fill', 'none');
      p.setAttribute('stroke-linecap', 'round'); p.setAttribute('stroke-linejoin', 'round');
      svg.appendChild(p);
    }
    if (kind === 'check') {
      path('M4 10.5l4 4 8-9', '#FF6730', '2');
    } else {
      path('M10 3 18 17H2L10 3Z', '#FFD400', '1.8');
      path('M10 8.5v3.2', '#FFD400', '1.8');
      path('M10 14.4v.2', '#FFD400', '1.8');
    }
    return svg;
  }

  function renderResult(res) {
    var t = TYPES[res.code];

    var badge = $('code-badge');
    badge.innerHTML = '';
    res.code.split('').forEach(function (ch) {
      var s = document.createElement('span');
      s.textContent = ch;
      badge.appendChild(s);
    });

    $('r-nickname').textContent = t.nickname;
    $('r-tagline').textContent = t.tagline;
    $('r-desc').textContent = t.desc;

    var traits = $('r-traits');
    traits.innerHTML = '';
    t.strengths.forEach(function (s) {
      var li = document.createElement('li');
      li.appendChild(makeIcon('check'));
      li.appendChild(document.createTextNode(s));
      traits.appendChild(li);
    });
    var liC = document.createElement('li');
    liC.appendChild(makeIcon('alert'));
    liC.appendChild(document.createTextNode(t.caution));
    traits.appendChild(liC);

    var axes = $('r-axes');
    axes.innerHTML = '';
    res.counts.forEach(function (c, a) {
      var total = c[0] + c[1];
      var pctL = total ? Math.round(c[0] / total * 100) : 50;
      var pctR = 100 - pctL;
      var leftWin = c[0] >= c[1];

      var row = document.createElement('div'); row.className = 'axis-row';
      var labels = document.createElement('div'); labels.className = 'axis-labels';

      var left = document.createElement('span');
      if (leftWin) {
        left.className = 'win';
        left.textContent = AXES[a].letters[0] + ' ' + AXES[a].names[0] + ' ';
        var lp = document.createElement('em'); lp.textContent = pctL + '%';
        left.appendChild(lp);
      } else {
        left.textContent = AXES[a].letters[0] + ' ' + AXES[a].names[0] + ' ' + pctL + '%';
      }

      var right = document.createElement('span');
      if (!leftWin) {
        right.className = 'win';
        var rp = document.createElement('em'); rp.textContent = pctR + '% ';
        right.appendChild(rp);
        right.appendChild(document.createTextNode(AXES[a].names[1] + ' ' + AXES[a].letters[1]));
      } else {
        right.textContent = pctR + '% ' + AXES[a].names[1] + ' ' + AXES[a].letters[1];
      }

      labels.appendChild(left); labels.appendChild(right);

      var track = document.createElement('div'); track.className = 'axis-track';
      var fill = document.createElement('div');
      fill.className = 'axis-fill' + (leftWin ? '' : ' anchor-right');
      fill.style.width = (leftWin ? pctL : pctR) + '%';
      track.appendChild(fill);

      row.appendChild(labels); row.appendChild(track);
      axes.appendChild(row);
    });

    var partner = TYPES[t.partner.code];
    var pn = $('r-partner-name');
    pn.innerHTML = '';
    var pb = document.createElement('b'); pb.textContent = t.partner.code;
    pn.appendChild(pb);
    pn.appendChild(document.createTextNode(' · ' + partner.nickname));
    $('r-partner-why').textContent = t.partner.why;
  }

  /* ── 공유 카드 캔버스 (1080×1350) ── */
  function rr(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  function fitFont(ctx, text, weight, maxSize, maxWidth) {
    var size = maxSize;
    do {
      ctx.font = weight + ' ' + size + 'px ' + FONT;
      if (ctx.measureText(text).width <= maxWidth) break;
      size -= 2;
    } while (size > 20);
    return size;
  }

  function renderShareCard(res) {
    var t = TYPES[res.code];
    var canvas = $('share-canvas');
    canvas.width = 1080; canvas.height = 1350;
    var ctx = canvas.getContext('2d');
    var CX = 540, MAXW = 888;

    /* 배경 + 보더 */
    ctx.fillStyle = '#0D0F12';
    ctx.fillRect(0, 0, 1080, 1350);
    ctx.strokeStyle = 'rgba(255,255,255,0.08)';
    ctx.lineWidth = 2;
    rr(ctx, 28, 28, 1024, 1294, 44);
    ctx.stroke();

    /* 코너 오렌지 악센트 */
    ctx.strokeStyle = '#E74408';
    ctx.lineWidth = 6;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(64, 188); ctx.lineTo(64, 64); ctx.lineTo(188, 64);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(1016, 1162); ctx.lineTo(1016, 1286); ctx.lineTo(892, 1286);
    ctx.stroke();

    ctx.textAlign = 'center';
    ctx.textBaseline = 'alphabetic';

    /* 상단 라벨 */
    ctx.fillStyle = '#FF6730';
    ctx.font = '800 34px ' + FONT;
    ctx.fillText('클라이밍 MBTI', CX, 170);

    /* 유형 코드 (그라데이션) */
    var grad = ctx.createLinearGradient(0, 220, 0, 420);
    grad.addColorStop(0, '#FF6730');
    grad.addColorStop(1, '#E74408');
    ctx.fillStyle = grad;
    ctx.font = '800 220px ' + FONT;
    ctx.fillText(res.code, CX, 420);

    /* 닉네임 (폭 맞춤) */
    ctx.fillStyle = '#F5F0E8';
    fitFont(ctx, t.nickname, '800', 76, MAXW);
    ctx.fillText(t.nickname, CX, 545);

    /* 태그라인 */
    ctx.fillStyle = '#AAAAAA';
    fitFont(ctx, t.tagline, '600', 38, MAXW);
    ctx.fillText(t.tagline, CX, 618);

    /* 축 바 4행 */
    var barX = 120, barW = 840, rowY = 730, rowH = 128;
    res.counts.forEach(function (c, a) {
      var total = c[0] + c[1];
      var pctL = total ? Math.round(c[0] / total * 100) : 50;
      var pctR = 100 - pctL;
      var leftWin = c[0] >= c[1];
      var y = rowY + a * rowH;

      ctx.font = '700 30px ' + FONT;
      ctx.fillStyle = leftWin ? '#F5F0E8' : '#AAAAAA';
      ctx.textAlign = 'left';
      ctx.fillText(AXES[a].letters[0] + ' ' + AXES[a].names[0] + ' · ' + pctL + '%', barX, y);
      ctx.fillStyle = leftWin ? '#AAAAAA' : '#F5F0E8';
      ctx.textAlign = 'right';
      ctx.fillText(pctR + '% · ' + AXES[a].names[1] + ' ' + AXES[a].letters[1], barX + barW, y);

      /* 트랙 */
      ctx.fillStyle = '#1a1a1a';
      rr(ctx, barX, y + 24, barW, 18, 9);
      ctx.fill();
      /* 채움 (이긴 쪽에서 앵커) */
      var fillW = Math.max(18, barW * (leftWin ? pctL : pctR) / 100);
      var fillX = leftWin ? barX : barX + barW - fillW;
      var fg = ctx.createLinearGradient(fillX, 0, fillX + fillW, 0);
      fg.addColorStop(0, leftWin ? '#E74408' : '#FF6730');
      fg.addColorStop(1, leftWin ? '#FF6730' : '#E74408');
      ctx.fillStyle = fg;
      rr(ctx, fillX, y + 24, fillW, 18, 9);
      ctx.fill();
    });

    /* 푸터 */
    ctx.textAlign = 'center';
    ctx.fillStyle = '#AAAAAA';
    ctx.font = '600 30px ' + FONT;
    ctx.fillText('Cliff — 클라이밍 MBTI', CX, 1278);

    return canvas;
  }

  /* ── 공유 흐름: 앱 시트 → navigator.share → 길게 눌러 저장 오버레이 ── */
  function showImageOverlay(dataURL) {
    $('share-img').src = dataURL;
    $('share-overlay').classList.add('visible');
  }

  function shareResult() {
    if (!state.result) return;
    var canvas = renderShareCard(state.result);
    var dataURL = canvas.toDataURL('image/png');

    if (B.shareImage(dataURL)) return; /* 앱 네이티브 공유 시트 */

    canvas.toBlob(function (blob) {
      if (!blob) { showImageOverlay(dataURL); return; }
      var file;
      try {
        file = new File([blob], 'cliff-mbti-' + state.result.code + '.png', { type: 'image/png' });
      } catch (e) { file = null; }
      if (file && navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
        navigator.share({ files: [file], title: '클라이밍 MBTI' }).catch(function (err) {
          if (!err || err.name !== 'AbortError') showImageOverlay(dataURL);
        });
      } else {
        showImageOverlay(dataURL);
      }
    }, 'image/png');
  }

  /* ── 이벤트 배선 ── */
  $('btn-start').addEventListener('click', function () {
    B.contentStart();
    state.index = 0;
    state.answers = [];
    state.result = null;
    renderQuestion();
    showScreen('question');
  });

  [0, 1].forEach(function (n) {
    var el = $('opt-' + n);
    el.addEventListener('pointerdown', function () {
      if (!state.locked) el.classList.add('pressed');
    });
    ['pointerup', 'pointercancel', 'pointerleave'].forEach(function (ev) {
      el.addEventListener(ev, function () { el.classList.remove('pressed'); });
    });
    el.addEventListener('click', function () { selectOption(n); });
  });

  $('btn-back').addEventListener('click', goBack);

  $('btn-share').addEventListener('click', shareResult);

  $('btn-retry').addEventListener('click', function () {
    /* contentEnd 호출 금지 — 콘텐츠 세션 유지한 채 인트로로 */
    state.index = 0;
    state.answers = [];
    state.result = null;
    loadLast();
    showScreen('intro');
  });

  $('btn-content-end').addEventListener('click', function () {
    B.contentEnd();
  });

  $('btn-overlay-close').addEventListener('click', function () {
    $('share-overlay').classList.remove('visible');
  });

  /* 처리 완료 신호 — 어느 화면에 있든 LIVE 반영 */
  B.onProcessingDone(updateProcessingUI);

  /* ── 초기화 ── */
  loadLast();
  updateProcessingUI();

  /* 검증용 내부 훅 (UI 비노출) */
  window.__mbtiDebug = {
    computeResult: computeResult,
    renderShareCard: renderShareCard,
    questions: QUESTIONS,
    axes: AXES,
    types: TYPES,
    state: state
  };
})();
</script>
</body>
</html>
